<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0c12">
<title>Suivi PP — Carnet de classe</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">PP</div>
      <div class="brand-text">
        <div class="t1">Suivi PP</div>
        <div class="t2">Carnet de classe</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-item" data-view="accueil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
        Accueil
      </button>
      <button class="nav-item" data-view="eleves">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4"/><path d="M4.5 20c1.4-4 4-6 7.5-6s6.1 2 7.5 6"/></svg>
        Élèves
      </button>
      <button class="nav-item" data-view="trombi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="4" width="17" height="16" rx="2"/><circle cx="12" cy="10.5" r="3"/><path d="M6 18c1-2.5 3-4 6-4s5 1.5 6 4"/></svg>
        Trombinoscope
      </button>
      <button class="nav-item" data-view="bulletins">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3.5" width="16" height="17" rx="1.6"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
        Bulletins
      </button>
      <button class="nav-item" data-view="conseils">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 3 8v8l9 5 9-5V8l-9-5Z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg>
        Conseils de classe
      </button>
      <button class="nav-item" data-view="orientation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h13M12 5l7 7-7 7"/></svg>
        Orientation
      </button>
      <button class="nav-item" data-view="rdv">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3v4M16 3v4M4 9h16M5 6h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z"/><path d="M8.5 14.5l2 2 4.5-4.5"/></svg>
        Rendez-vous
      </button>
      <button class="nav-item" data-view="agenda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><path d="M12 7v5l3.5 2"/></svg>
        Agenda
      </button>
      <button class="nav-item" data-view="cours">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/><path d="M9 7h7M9 11h7"/></svg>
        Cours &amp; activités
      </button>
    </nav>
    <div class="sidebar-footer">
      <div id="save-status" class="save-status">—</div>
      <div class="class-pill">
        <b id="classe-nom-pill">Classe non définie</b>
        <span id="classe-effectif-pill">0 élève</span>
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%; margin-top:8px; justify-content:center;" id="btn-export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
        Exporter / importer
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="menu-btn" id="menu-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h1 id="view-title">Accueil</h1>
          <div class="sub" id="view-sub">Vue d'ensemble de la classe</div>
        </div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- generic modal mount -->
<div id="modal-root"></div>

<script src="app.js"></script>
</body>
</html>
